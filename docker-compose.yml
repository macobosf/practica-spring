services:
  # ============================================
  # POSTGRESQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: fundamentos01-postgres
    restart: always
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: ups
      POSTGRES_PASSWORD: ups123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ups -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SPRING BOOT API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fundamentos01-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: devdb
      DB_USERNAME: ups
      DB_PASSWORD: ups123
      JWT_SECRET: local-docker-secret-change-this-min-256-bits-long
      JWT_EXPIRATION: 1800000
      JWT_REFRESH_EXPIRATION: 604800000
      # Solo para el primer arranque local: crea el esquema porque el
      # volumen de Postgres empieza vacío. En Render/Railway NO se
      # define esta variable, así que se usa "validate" por defecto.
      JPA_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
